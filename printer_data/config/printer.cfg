
# STM32F103 with a "28KiB bootloader" and USB communication. 
# select "Enable extra low-level configuration options" and configure
# "GPIO pins to set at micro-controller startup" to "!PA14".

# copy the generated "out/klipper.bin" file to a
# file named "firmware.bin" on an SD card and then restart the SKR
# mini E3 with that SD card.
# klipper backup
# ======================================================================
##================PRINTER SETUP=========================================
[virtual_sdcard]
path: ~/printer_data/gcodes

[bltouch]
stow_on_each_sample: False
probe_with_touch_mode: True
sensor_pin: ^PC14
control_pin: PA1
pin_move_time: 0.5
pin_up_touch_mode_reports_triggered: False
x_offset: 51
y_offset: -6
#z_offset: 0.0
speed: 10
lift_speed: 20
samples: 3
sample_retract_dist: 5
samples_tolerance_retries: 3

[screws_tilt_adjust]
horizontal_move_z: 10
screw1: 0,30
screw1_name: front left 
screw2: 148,30
screw2_name: front right 
screw3: 148,200
screw3_name: back right 
screw4: 0,200
screw4_name: back left 
screw_thread: CW-M4 

[force_move]
enable_force_move: True

[safe_z_home]
home_xy_position: 0,20
speed: 150
z_hop: 15
z_hop_speed: 20

[bed_mesh]
speed: 120
horizontal_move_z: 7
mesh_min: 54,7
mesh_max: 225,204
probe_count: 5,5
mesh_pps: 2,2
algorithm: bicubic
fade_start: 1
fade_end: 12

[exclude_object]

[stepper_x]
step_pin: PB13
dir_pin: !PB12
enable_pin: !PB14
microsteps: 16
rotation_distance: 40
endstop_pin: ^PC0
position_endstop: 0
position_max: 225
homing_speed: 50

[tmc2209 stepper_x]
uart_pin: PC11
tx_pin: PC10
uart_address: 0
run_current: 0.580
#hold_current: 0.50
stealthchop_threshold: 0
interpolate: False

[stepper_y]
step_pin: PB10
dir_pin: !PB2
enable_pin: !PB11
microsteps: 16
rotation_distance: 40
endstop_pin: ^PC1
position_endstop: 0
position_max: 218
position_min: 0
homing_speed: 50

[tmc2209 stepper_y]
uart_pin: PC11
tx_pin: PC10
uart_address: 2
run_current: 0.75
#hold_current: 0.50
stealthchop_threshold: 0
interpolate: False

[stepper_z]
step_pin: PB0
dir_pin: PC5
enable_pin: !PB1
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
position_min: -4
position_max: 230

[tmc2209 stepper_z]
uart_pin: PC11
tx_pin: PC10
uart_address: 1
hold_current: 0.580
run_current: 0.8
stealthchop_threshold: 0
interpolate: False

[extruder]
step_pin: PB3
dir_pin: !PB4
enable_pin: !PD2
microsteps: 16
rotation_distance:7.701
nozzle_diameter: 0.400
filament_diameter: 1.750
max_extrude_only_distance: 110
max_extrude_only_velocity: 50
heater_pin: PC8
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PA0
#control: pid
#pid_Kp: 21.527
#pid_Ki: 1.063
#pid_Kd: 108.982
min_temp: 0
max_temp: 270
pressure_advance: 0.04
max_extrude_only_accel: 4000



[tmc2209 extruder]
uart_pin: PC11
tx_pin: PC10
uart_address: 3
run_current: 0.500
stealthchop_threshold: 0
interpolate: True

[heater_bed]
heater_pin: PC9
sensor_type: ATC Semitec 104GT-2
sensor_pin: PC3
#control: pid
#pid_Kp: 54.027
#pid_Ki: 0.770
#pid_Kd: 948.182
min_temp: 0
max_temp: 130

[heater_fan nozzle_cooling_fan]
pin: PC7

[fan]
pin: PC6

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32f103xe_38FFD5054253383211762057-if00

[mcu rpi]
serial: /tmp/klipper_host_mcu

[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 5000
#max_accel_to_decel: 1500
max_z_velocity: 10
max_z_accel: 500
square_corner_velocity: 4

[firmware_retraction]
retract_length: 0.8
retract_speed: 40
unretract_speed: 40

[input_shaper]
shaper_type_x: ei
shaper_freq_x: 40.4
shaper_type_y: mzv
shaper_freq_y: 33.0


[static_digital_output usb_pullup_enable]
pins: !PA14

[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PB5,  EXP1_3=PA9,   EXP1_5=PA10, EXP1_7=PB8,  EXP1_9=<GND>,
    EXP1_2=PA15, EXP1_4=<RST>, EXP1_6=PB9,  EXP1_8=PB15, EXP1_10=<5V>

# -----------------------
# COB LED via Raspberry GPIO18
# -----------------------
[output_pin cob_led]
#pin: rpi:gpio18 #Για software PWM
#pin: rpi:pwmchip0/pwm0
#pwm: True
#cycle_time: 0.00005
#value: 0
#shutdown_value: 0
#hardware_pwm: True

[output_pin cob_led]
pin: rpi:gpio18
value: 0
shutdown_value: 0


#===========MOONRAKER=================================================
[include shell_command.cfg]

[include macros.cfg]

[include timelapse.cfg]

[display_status]

[pause_resume]

[include adxl.cfg]

[include Klipper-Adaptive-Meshing-Purging/Configuration/KAMP_Settings.cfg]
[include Klipper-Adaptive-Meshing-Purging/Configuration/Adaptive_Meshing.cfg]
[include Klipper-Adaptive-Meshing-Purging/Configuration/Line_Purge.cfg]
[include Klipper-Adaptive-Meshing-Purging/Configuration/Smart_Park.cfg]


##============Sensors ===================##

[temperature_sensor raspberry_pi]
sensor_type: temperature_host
min_temp: 10
max_temp: 100

[temperature_sensor mcu_temp]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

#[filament_switch_sensor FILAMENT_SENSOR]
#pause_on_runout: True
#   When set to True, a PAUSE will execute immediately after a runout
#   is detected. Note that if pause_on_runout is False and the
#   runout_gcode is omitted then runout detection is disabled. Default
#   is True.
#runout_gcode:
#   A list of G-Code commands to execute after a filament runout is
#   detected. See docs/Command_Templates.md for G-Code format. If
#   pause_on_runout is set to True this G-Code will run after the
#   PAUSE is complete. The default is not to run any G-Code commands.
#insert_gcode:
#   A list of G-Code commands to execute after a filament insert is
#   detected. See docs/Command_Templates.md for G-Code format. The
#   default is not to run any G-Code commands, which disables insert
#   detection.
#event_delay: 3.0
#   The minimum amount of time in seconds to delay between events.
#   Events triggered during this time period will be silently
#   ignored. The default is 3 seconds.
#pause_delay: 0.5
#   The amount of time to delay, in seconds, between the pause command
#   dispatch and execution of the runout_gcode. It may be useful to
#   increase this delay if OctoPrint exhibits strange pause behavior.
#   Default is 0.5 seconds.
#switch_pin: PC2
#   The pin on which the switch is connected. This parameter must be
#   provided.

[include moonraker_obico_macros.cfg]

