
[resonance_tester]
probe_points: 115, 115, 20
accel_chip: adxl345

[adxl345]
cs_pin: EXP1_1 
spi_software_sclk_pin: EXP1_6
spi_software_mosi_pin: EXP1_7
spi_software_miso_pin: EXP1_8

[gcode_macro TEST_X]
gcode:
    TEST_RESONANCES AXIS=X

[gcode_macro TEST_Y]
gcode:
    TEST_RESONANCES AXIS=Y

[gcode_macro CREATE_X_PNG]
gcode:
    RUN_SHELL_COMMAND CMD=CREATE_X_PNG

[gcode_macro CREATE_Y_PNG]
gcode:
   RUN_SHELL_COMMAND CMD=CREATE_Y_PNGE
    
     

