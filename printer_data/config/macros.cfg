#==================== MACROS =========================================


#---------------------------------------------------------
#  PAUSE / RESUME / CANCEL_PRINT (Your versions)
#---------------------------------------------------------
[gcode_macro PAUSE]
rename_existing: PAUSE_BASE
gcode:
    {% set client = printer["gcode_macro _CLIENT_VARIABLE"] %}
    PAUSE_BASE

    {% if client.use_custom_pos %}
        {% set x = client.custom_park_x %}
        {% set y = client.custom_park_y %}
        {% set dz = client.custom_park_dz %}
    {% else %}
        {% set x = printer.toolhead.axis_maximum.x - 10 %}
        {% set y = printer.toolhead.axis_maximum.y - 10 %}
        {% set dz = 2 %}
    {% endif %}

    SAVE_GCODE_STATE NAME=PAUSE_state

    {% if client.retract > 0 %}
        G1 E-{client.retract} F{client.speed_retract * 60}
    {% endif %}

    G91
    G1 Z{dz} F{client.speed_hop * 60}
    G90

    G1 X{x} Y{y} F{client.speed_move * 60}

    {client.user_pause_macro}

[gcode_macro RESUME]
rename_existing: RESUME_BASE
gcode:
    {% set client = printer["gcode_macro _CLIENT_VARIABLE"] %}

    # Επαναφορά κατάστασης ΠΡΙΝ το unretract
    RESTORE_GCODE_STATE NAME=PAUSE_state MOVE=1

    # Unretract
    {% if client.unretract > 0 %}
        G1 E{client.unretract} F{client.speed_unretract * 60}
    {% endif %}

    # Custom resume macro (αν υπάρχει)
    {client.user_resume_macro}

    # Ορισμός ταχύτητας επιστροφής (200 mm/s)
    G1 F{client.speed_move * 60}

    # Dummy move για να "κλειδώσει" το feedrate
    G1 X{printer.toolhead.position.x} Y{printer.toolhead.position.y}
  
    # Συνέχιση της εκτύπωσης
    RESUME_BASE

    
[gcode_macro CANCEL_PRINT]
rename_existing: CANCEL_PRINT_BASE
gcode:
    {% set client = printer["gcode_macro _CLIENT_VARIABLE"] %}

    # Προαιρετικό retract
    {% if client.cancel_retract > 0 %}
        G91
        G1 E-{client.cancel_retract} F{client.speed_retract * 60}
        G90
    {% endif %}

    # Park αν είναι ενεργοποιημένο
    {% if client.park_at_cancel %}
        G91
        G1 Z{client.custom_park_dz} F{client.speed_hop * 60}
        G90
        G1 X{client.park_at_cancel_x} Y{client.park_at_cancel_y} F{client.speed_move * 60}
    {% endif %}

    {client.user_cancel_macro}
    CANCEL_PRINT_BASE 
    M84
    RUN_SHELL_COMMAND CMD=LIGHT_OFF    
    M117

[gcode_macro M600]
description: Filament change
gcode:
    {% set client = printer["gcode_macro _CLIENT_VARIABLE"] %}
    {% set min_z = 30 %}
    {% set current_z = printer.toolhead.position.z %}

    # Πρώτα retract για καθαρό nozzle
    {% if client.retract > 0 %}
        G91
        G1 E-{client.retract} F{client.speed_retract * 60}
        G90
    {% endif %}

    {% if current_z < min_z %}
        {% set lift = min_z - current_z %}
        G91
        G1 Z{lift} F600
        G90
    {% endif %}

    PAUSE

[gcode_macro _CLIENT_VARIABLE]
variable_use_custom_pos   : True ; use custom park coordinates for x,y [True/False]
variable_custom_park_x    : 10.0   ; custom x position; value must be within your defined min and max of X
variable_custom_park_y    : 10.0   ; custom y position; value must be within your defined min and max of Y
variable_custom_park_dz   : 2.0   ; custom dz value; the value in mm to lift the nozzle when move to park position
variable_retract          : 1.0   ; the value to retract while PAUSE
variable_cancel_retract   : 1.0   ; the value to retract while CANCEL_PRINT
variable_speed_retract    : 35.0  ; retract speed in mm/s
variable_unretract        : 1.0   ; the value to unretract while RESUME
variable_speed_unretract  : 35.0  ; unretract speed in mm/s
variable_speed_hop        : 15.0  ; z move speed in mm/s
variable_speed_move       : 200.0 ; move speed in mm/s
variable_park_at_cancel   : True ; allow to move the toolhead to park while execute CANCEL_PRINT [True/False]
variable_park_at_cancel_x : 10.0  ; different park position during CANCEL_PRINT [None/Position as Float]; park_at_cancel must be True
variable_park_at_cancel_y : 198.0  ; different park position during CANCEL_PRINT [None/Position as Float]; park_at_cancel must be True
## !!! Caution [firmware_retraction] must be defined in the printer.cfg if you set use_fw_retract: True !!!
variable_use_fw_retract   : False ; use fw_retraction instead of the manual version [True/False]
variable_idle_timeout     : 0     ; time in sec until idle_timeout kicks in. Value 0 means that no value will be set or restored
#variable_runout_sensor    : ""    ; If a sensor is defined, it will be used to cancel the execution of RESUME in case no filament is detected.
##                                   Specify the config name of the runout sensor e.g "filament_switch_sensor runout". Hint use the same as in your printer.cfg
## !!! Custom macros, please use with care and review the section of the corresponding macro.
## These macros are for simple operations like setting a status LED. Please make sure your macro does not interfere with the basic macro functions.
## Only  single line commands are supported, please create a macro if you need more than one command.
variable_user_pause_macro : ""    ; Everything inside the "" will be executed after the klipper base pause (PAUSE_BASE) function
variable_user_resume_macro: ""    ; Everything inside the "" will be executed before the klipper base resume (RESUME_BASE) function
variable_user_cancel_macro: "TURN_OFF_HEATERS"    ; Everything inside the "" will be executed before the klipper base cancel (CANCEL_PRINT_BASE) function
gcode:       

#---------------------------------------------------------
#  START_PRINT – Works with slicer temps + mesh + purge
#---------------------------------------------------------
[gcode_macro START_PRINT]
description: Start print (slicer temps + KAMP purge & mesh)
gcode:
    {% set BED_TEMP = params.BED_TEMP|default(0)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(0)|float %}
    {% set NOZZLE_HOLD = 150 %}

    M117 Preheating...
    G90
    M82
    M107                       ; fan off at start

    # -------------------------
    # Preheat (non-blocking)
    # -------------------------
    {% if BED_TEMP > 0 %}
        M140 S{BED_TEMP}
    {% endif %}
    {% if EXTRUDER_TEMP > 0 %}
        M104 S{NOZZLE_HOLD}
    {% endif %}

    # -------------------------
    # Home
    # -------------------------
    G28
        
    # -------------------------
    # Wait for BED TEMP
    # -------------------------
    {% if BED_TEMP > 0 %}
        M190 S{BED_TEMP}
    {% endif %}
    
    BED_MESH_CLEAR
    BED_MESH_CALIBRATE

    # -------------------------
    # Heat Nozzle Print Temp
    # -------------------------

    G1 X5 Y5 F4000
    G1 Z20 F800

    {% if EXTRUDER_TEMP > 0 %}
        M104 S{EXTRUDER_TEMP}
        M109 S{EXTRUDER_TEMP}
    {% endif %}
    
    # -------------------------
    # Lights on
    # -------------------------
    RUN_SHELL_COMMAND CMD=LIGHT_ON
    M117 Printing...
    PURGE_LINE


         
   
#---------------------------------------------------------
#  END_PRINT – Clean, safe, lights off
#---------------------------------------------------------
[gcode_macro END_PRINT]
gcode:
    G91
    G1 E-1 F300
    G1 Z10 F3000
    G90

    #Park
    G1 X0 Y200 F6000

    #Motor Fan Switch Off
    M104 S0
    M140 S0
    M107
    M84
    RUN_SHELL_COMMAND CMD=LIGHT_OFF
    M117


#---------------------------------------------------------
#  Filament Load / Unload (unchanged)
#---------------------------------------------------------
[gcode_macro UNLOAD_FILAMENT]
gcode:
    SAVE_GCODE_STATE NAME=UNLOAD_state

    {% set min_temp = 200 %}
    {% if printer.extruder.temperature < min_temp %}
      M109 S{min_temp}
      M117 HEATING NOZZLE...
    {% endif %}

    G91
    G1 E2 F300
    G1 E-10 F300
    G1 E-100 F2000
    G90
    RESTORE_GCODE_STATE NAME=UNLOAD_state


[gcode_macro LOAD_FILAMENT]
gcode:
    SAVE_GCODE_STATE NAME=LOAD_state
    {% set min_temp = 200 %}
    {% if printer.extruder.temperature < min_temp %}
      M109 S{min_temp}
      M117 HEATING NOZZLE...
    {% endif %}

    G91
    G1 E20 F300
    G1 E80 F2000
    G1 E50 F200
    G90
    RESTORE_GCODE_STATE NAME=LOAD_state

[delayed_gcode clear_display]
gcode:
  M117

[delayed_gcode WELCOME]
initial_duration: 5.
gcode:
  M117 Hi Andreas!
  UPDATE_DELAYED_GCODE ID=clear_display DURATION=10

#---------------------------------------------------------
#  PURGE_LINE – Clean, stable, no blobs
#---------------------------------------------------------
[gcode_macro PURGE_LINE]
gcode:
    G90
    M82
    G92 E0

    G1 X5 Y5 F4000
    G1 Z0.28 F300

    G1 X120 E12 F1000

    G92 E0


#---------------------------------------------------------
#  Lights / Fans
#---------------------------------------------------------
[gcode_macro LIGHT_ON]
gcode:
    RUN_SHELL_COMMAND CMD=LIGHT_ON

[gcode_macro LIGHT_OFF]
gcode:
    RUN_SHELL_COMMAND CMD=LIGHT_OFF

[gcode_macro PI_FAN_ON]
gcode:
    RUN_SHELL_COMMAND CMD=PI_FAN_ON

[gcode_macro PI_FAN_OFF]
gcode:
    RUN_SHELL_COMMAND CMD=PI_FAN_OFF

# -----------------------
# Light OFF-ON
# -----------------------

[gcode_macro LED_ON]
gcode:
    SET_PIN PIN=cob_led VALUE=1

[gcode_macro LED_OFF]
gcode:
    SET_PIN PIN=cob_led VALUE=0

#### Klipper backup ###
#### -------------- ###

[gcode_macro update_git]
gcode:
    {% set message = params.MESSAGE|default() %}
    {% if message %}
        RUN_SHELL_COMMAND CMD=update_git_script_message PARAMS="'{params.MESSAGE}'"
    {% else %}
        RUN_SHELL_COMMAND CMD=update_git_script
    {% endif %}

####################################
# TPU MODE ON-OFF
####################################

[gcode_macro TPU_MODE_ON]
description: "Enable TPU-safe motion limits"
variable_saved_scv: 5.0 #Είναι απλα μια αρχική τιμη για το macro. Δεν λαμβανεται υποψη
gcode:
    # Read current SCV from config
    {% set current_scv = printer.configfile.settings.printer.max_square_corner_velocity %}
    SET_GCODE_VARIABLE MACRO=TPU_MODE_ON VARIABLE=saved_scv VALUE={current_scv}

    # Apply TPU-safe SCV
    SET_VELOCITY_LIMIT SQUARE_CORNER_VELOCITY=2

    M117 TPU mode ON

[gcode_macro TPU_MODE_OFF]
description: "Restore normal motion limits"
gcode:
    SET_VELOCITY_LIMIT SQUARE_CORNER_VELOCITY={TPU_MODE_ON.saved_scv}
    M117 TPU mode OFF


[gcode_macro CALIBRATE_ROTATION_DISTANCE]
description: Extruder rotation distance calibration (manual measurement)
gcode:

  SET_PRESSURE_ADVANCE ADVANCE=0
  G91
  G1 E100 F60     ; main extrusion
  G90

  RESPOND TYPE=info MSG="Extruded 100mm. Measure remaining filament from 120mm mark."


  ##Spoolmanager##

[gcode_macro SET_ACTIVE_SPOOL]
gcode:
  {% if params.ID %}
    {% set id = params.ID|int %}
    {action_call_remote_method(
       "spoolman_set_active_spool",
       spool_id=id
    )}
  {% else %}
    {action_respond_info("Parameter 'ID' is required")}
  {% endif %}

[gcode_macro CLEAR_ACTIVE_SPOOL]
gcode:
  {action_call_remote_method(
    "spoolman_set_active_spool",
    spool_id=None
  )}
  

